<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Date Calculator</title>
    <style>
        :root { --ios-bg: #f2f2f7; --ios-row: #ffffff; --ios-border: #c6c6c8; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); margin: 0; padding: 0; }
        .header { text-align: center; padding: 15px; font-weight: 600; background: white; border-bottom: 0.5px solid var(--ios-border); }
        .section { margin-top: 20px; border-top: 0.5px solid var(--ios-border); background: var(--ios-row); }
        .row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--ios-border); align-items: center; }
        input[type="date"] { border: none; font-size: 17px; color: #007aff; background: none; outline: none; }
        .val { color: #8e8e93; font-variant-numeric: tabular-nums; }
        .footer { position: fixed; bottom: 0; width: 100%; display: flex; background: #f9f9f9; border-top: 0.5px solid var(--ios-border); padding-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 10px; color: #8e8e93; }
        .active { color: #007aff; }
    </style>
</head>
<body>
    <div class="header">Date Calculator</div>
    <div class="section">
        <div class="row"><span>From</span><input type="date" id="d1" onchange="calc()"></div>
        <div class="row"><span>To</span><input type="date" id="d2" onchange="calc()"></div>
    </div>
    <div class="section">
        <div class="row"><span>Days</span><span class="val" id="rDays">0</span></div>
        <div class="row"><span>Weeks</span><span class="val" id="rWeeks">0</span></div>
        <div class="row"><span>Hours</span><span class="val" id="rHours">0</span></div>
        <div class="row"><span>Minutes</span><span class="val" id="rMin">0</span></div>
    </div>
    <div class="footer">
        <div class="tab active">📅<br>Date</div>
        <div class="tab">🕒<br>Time</div>
        <div class="tab">⚙️<br>Settings</div>
    </div>
    <script>
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('d1').value = today;
        document.getElementById('d2').value = today;
                function calc() {
            const start = new Date(document.getElementById('d1').value);
            const end = new Date(document.getElementById('d2').value);
            
            const diff = Math.abs(end - start);
            const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            // Logic for Weeks and leftover Days
            const weeks = Math.floor(totalDays / 7);
            const daysLeft = totalDays % 7;
            
            document.getElementById('rDays').innerText = totalDays.toLocaleString();
            
            // This replaces the 2.6 with "2 Weeks, 4 Days"
            document.getElementById('rWeeks').innerText = weeks + " Weeks, " + daysLeft + " Days";
            
            document.getElementById('rHours').innerText = (totalDays * 24).toLocaleString();
            document.getElementById('rMin').innerText = (totalDays * 1440).toLocaleString();
        }

    </script>
</body>
</html>
